<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">
    <script src="./assets/js/script.js"></script>
    <title>JavaScript Training Currency Converter</title>
</head>
<img src="./assets/img/logo.png" alt="logo-convert-money">

<main>
    <label for="">
        Converter <b>de</b>
        <select name="" id="">
            <option value="BRL">R$: Real Brasileiro</option>
        </select>
    </label>

    <label for="">
        Converter <b>para</b>
        <select name="" id="">
            <option value="USB">US$: Dórlar Americano</option>
            <option value="EUR">€: Euro</option>
        </select>
    </label>

    <label for="">
        Valor
        <input type="text" placeholder="R$: 10.000,00" />
    </label>

    <button>Converter</button>

    <section>
        <div>
            <img src="./assets/img/brasil.png" alt="base-currency-logo">
            <p>Real</p>
            <p>R$: 0,00</p>
        </div>
        <img src="./assets/img/Vector.png" alt="turning-arrow">
        <div>
            <img src="./assets/img/estados-unidos.png" alt="converted-currency-logo">
            <p>Dólar</p>
            <p>US$: 0,00</p>
        </div>
    </section>
</main>

<body>

</body>

</html>
