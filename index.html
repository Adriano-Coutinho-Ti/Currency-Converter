<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">
    <title>JavaScript Training Currency Converter</title>
</head>

<body>
    <img class="logo" src="./assets/img/logo.gif" alt="logo-convert-money">

    <main>
        <label for="">
            Converter <b>de</b>
            <select name="currency-to-Convert" id="">
                <option value="BRL">R$ Real Brasileiro</option>
            </select>
        </label>

        <label for="">
            Converter <b>para</b>
            <select class="currency-select" name="currency-select" id="">
                <option value="USD">$ Dólar Americano</option>
                <option value="EUR">€ Euro</option>
                <option value="GBP">£ Libra Esterlina</option>
                <option value="BTC">₿ Bitcoin</option>
            </select>
        </label>

        <label for="">
            Valor
            <input class="input-currency" type="text" placeholder="R$: 10.000,00" />
        </label>

        <button class="convert-button">Converter</button>

        <section>
            <div class="currency-box">
                <img src="./assets/img/brasil.png" alt="base-currency-logo">
                <p class="currency">Real</p>
                <p class="currency-value-to-convert">R$: 0,00</p>
            </div>

            <img class="arrow-img" src="./assets/img/Vector.png" alt="turning-arrow">

            <div class="currency-box">
                <img  class="currency-img" src="./assets/img/estados-unidos.png" alt="converted-currency-logo">
                <p class="currency" id="currency-name">Dólar Americano</p>
                <p class="currency-value">US$: 0,00</p>
                </div>
        </section>
    </main>

</body>
<script src="./assets/js/scripts.js"></script>
</html>
